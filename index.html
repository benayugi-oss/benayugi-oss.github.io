<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Professional Styled Website</title>
    
    <style> 
        /* --- THE PS3 WAVE BACKGROUND --- */
        @keyframes waveFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #050505, #001f3f, #001122, #050505);
            background-size: 400% 400%;
            animation: waveFlow 15s ease-in-out infinite;
            color: #ffffff;
            font-family: "Times New Roman", Times, serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        /* --- THE GLASS CONTAINER --- */
        .container {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;             
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            max-width: 550px;
            width: 100%;
            text-align: center;        
        }

        h1, h2 {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        h1 { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }

        .profile-pic {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin: 25px 0;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-pic:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255,255,255,0.25);
        }

        .game-image {
            max-width: 100%;
            width: 180px;
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 15px auto; 
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        li:hover {
            transform: translateX(10px);
            color: #00d2ff;
        }

        li:hover .game-image {
            transform: scale(1.1);
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
        }

        a {
            color: #00d2ff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #00d2ff;
        }

        ol {
            text-align: left;
            display: inline-block;
            margin-bottom: 20px;
            list-style-position: outside;
        }

        li {
            margin-bottom: 30px;
            transition: 0.3s;
        }
    </style>
</head>

<body>

        <h1>Hello, World!</h1>
