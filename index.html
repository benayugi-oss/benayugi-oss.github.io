<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Professional Styled Website</title>
    
    <style>
        body {
            background-color: #f0f4f8; 
            color: #333333;           
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6;          
            margin: 0;                 
            display: flex;
            justify-content: center;   
            align-items: center;       
            min-height: 100vh;         
            padding: 20px; /* Added padding for mobile phone screens */
        }

        .container {
            background-color: white;   
            padding: 40px;             
            border-radius: 20px; /* Slightly rounder for a friendlier look */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Softer, more modern shadow */
            max-width: 500px;          
            text-align: center;        
        }

        h1 {
            color: #2d5a27;           
            margin-bottom: 15px;      
        }

        /* I moved your image styling here! */
        .profile-pic {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 12px;
            margin: 25px 0;
            display: inline-block;
        }

        /* Styling the Link */
        a {
            color: #2d5a27; /* Matches your heading */
            text-decoration: none; /* Removes the underline */
            font-weight: bold;
            transition: 0.3s; /* Makes the color change smooth */
        }

        a:hover {
            color: #4a8c41; /* Lightens the green when you hover over it */
            text-decoration: underline; /* Underline only appears when hovering */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello, World!</h1>
        
        <p>I’m learning how to style my website using CSS. It's starting to look pretty good!</p>
        
        <img src="my-image.jpg" alt="A beautiful landscape photo" class="profile-pic">

        <p>Check out my favorite website: <br>
            <a href="https://www.google.com" target="_blank">Click here to visit!</a>
        </p>
    </div>

</body>
</html>
