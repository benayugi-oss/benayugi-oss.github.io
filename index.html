<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Professional Styled Website</title>
    
    <style> 
        /* --- 1. THE PS3 WAVE & FLOATING PARTICLES --- */
        @keyframes waveFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        body {
            /* Deep Sony Blue/Black Gradient */
            background: linear-gradient(-45deg, #050505, #001f3f, #001122, #050505);
            background-size: 400% 400%;
            animation: waveFlow 15s ease-in-out infinite;
            color: #ffffff;
            font-family: "Times New Roman", Times, serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 60px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 2. FLOATING ICONS (The Particles) --- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.15);
            animation: float 25s infinite linear;
        }

        /* PlayStation Shapes */
        .circle { border-radius: 50%; width: 12px; height: 12px; }
        .square { width: 12px; height: 12px; }
        .triangle { 
            width: 0; height: 0; 
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 14px solid rgba(255, 255, 255, 0.15);
            background: transparent;
        }

        /* --- 3. THE GLASS CONTAINER --- */
        .container {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;             
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            max-width: 550px;
            width: 100%;
            text-align: center;
            z-index: 1;
            /* Subtile Glossy Shine */
            background-image: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%);
        }

        /* --- 4. CINEMATIC TEXT STYLES --- */
        h1, h2 {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 200;
            text-transform: uppercase;
            letter-spacing: 10px; /* Cinematic spacing */
            color: #ffffff;
            /* High-definition Glow */
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.5), 
                         0 0 25px rgba(0, 210, 255, 0.3);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.8;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        h1 { border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 25px; }

        /* --- 5. IMAGES (Main and Game Icons) --- */
        .profile-pic {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            margin: 30px 0;
            border: 1px solid rgba(255,255,255,0.2);
